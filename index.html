
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>Vipera: Prism Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;900&display=swap');
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000000;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            user-select: none;
            font-family: 'Outfit', sans-serif;
        }
        .bg-mesh {
            background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
        }
        .prism-text {
            background: linear-gradient(90deg, #fff, #666, #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }
        @keyframes shine {
            to { background-position: 200% center; }
        }
        .blur-orb {
            filter: blur(80px);
            border-radius: 50%;
            position: absolute;
            z-index: 0;
            opacity: 0.4;
        }
        /* Блокировка ландшафта */
        @media (orientation: landscape) {
            #portrait-warning {
                display: flex !important;
            }
        }
        #portrait-warning {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 2rem;
        }
        .shake {
            animation: shake 0.2s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-mesh">
    <div id="root"></div>
    <div id="portrait-warning">
        <div class="text-4xl mb-4">📱</div>
        <div class="font-black uppercase tracking-widest text-xs">Please rotate to portrait</div>
    </div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
